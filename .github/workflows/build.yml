name: Build TimeTracker

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Qt
        run: |
          brew install qt
          echo "QT_PATH=$(brew --prefix qt)" >> $GITHUB_ENV
          
      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=$(brew --prefix qt)
          
      - name: Build
        run: |
          cd build
          make
          
      - name: Deploy Qt libraries
        run: |
          cd build
          # Правильный путь к macdeployqt
          MACDEPLOYQT=$(find /usr/local/Cellar/qt -name "macdeployqt" -type f 2>/dev/null | head -1)
          if [ -z "$MACDEPLOYQT" ]; then
            MACDEPLOYQT=$(find /opt/homebrew/Cellar/qt -name "macdeployqt" -type f 2>/dev/null | head -1)
          fi
          echo "Using macdeployqt: $MACDEPLOYQT"
          
          # Запускаем macdeployqt
          $MACDEPLOYQT TimeTrack.app -verbose=2
          
          # Проверяем что внутри .app
          ls -la TimeTrack.app/Contents/Frameworks/
          ls -la TimeTrack.app/Contents/PlugIns/
          
      - name: Create DMG
        run: |
          cd build
          # Создаем DMG
          hdiutil create -volname "TimeTracker" -srcfolder TimeTrack.app -ov -format UDZO -fs HFS+ TimeTracker.dmg
          
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: TimeTracker-Mac
          path: build/TimeTracker.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Qt
        run: |
          sudo apt update
          sudo apt install -y qt6-base-dev qt6-tools-dev cmake make
          
      - name: Build
        run: |
          mkdir build
          cd build
          cmake ..
          make
          
      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: TimeTracker-Linux
          path: build/TimeTrack
